<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EmailAgent | Smart Inbox</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            color: #eef2ff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            z-index: 50; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 2rem 1.5rem; border-bottom: 1px solid rgba(59,130,246,0.2); }
        .logo { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk', monospace; font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { flex: 1; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 0.75rem 1rem; border-radius: 12px; color: #94a3b8; transition: all 0.2s; text-decoration: none; }
        .nav-link:hover { background: rgba(59,130,246,0.15); color: #60a5fa; transform: translateX(4px); }
        .nav-link.active { background: linear-gradient(90deg, rgba(59,130,246,0.2), transparent); color: #60a5fa; border-left: 3px solid #3b82f6; }
        .sidebar-footer { padding: 1.5rem; border-top: 1px solid rgba(59,130,246,0.2); }
        .agent-status { background: rgba(34,197,94,0.15); border-radius: 12px; padding: 1rem; text-align: center; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        .run-agent-btn { width: 100%; margin-top: 12px; background: linear-gradient(90deg, #3b82f6, #2563eb); border: none; padding: 8px; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .run-agent-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
        
        /* Main content */
        .main-content { margin-left: 280px; padding: 2rem; min-height: 100vh; }
        
        /* Top header bar with search */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
        }
        .global-search {
            flex: 1; max-width: 400px; position: relative;
        }
        .global-search input {
            width: 100%; padding: 12px 20px; border-radius: 40px;
            border: 1px solid #334155; background: #1e293b; color: white;
            font-size: 0.9rem; outline: none; transition: all 0.2s;
        }
        .global-search input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .global-search i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }
        
        .header-icons { display: flex; gap: 1rem; }
        .header-icon { background: #1e293b; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .header-icon:hover { background: #3b82f6; color: white; transform: scale(1.05); }
        
        /* Glass card */
        .glass-card {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px);
            border-radius: 24px; border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(59,130,246,0.5); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); transform: translateY(-2px); }
        
        /* Modal (same for list and email detail) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-container {
            background: #0f172a; border-radius: 32px; width: 90%; max-width: 800px;
            max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
            border: 1px solid #3b82f6; animation: fadeInUp 0.3s ease;
        }
        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { overflow-y: auto; padding: 1.5rem; flex: 1; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 1rem; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1rem; }
            .mobile-menu-btn { display: block; position: fixed; top: 1rem; left: 1rem; z-index: 60; background: rgba(30,41,59,0.9); backdrop-filter: blur(4px); border-radius: 12px; padding: 0.5rem; cursor: pointer; }
        }
        @media (min-width: 1025px) { .mobile-menu-btn { display: none; } }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s; }
        .btn-secondary { background: #334155; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars fa-xl" style="color: #60a5fa;"></i></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo"><i class="fas fa-envelope-open-text"></i><span>EmailAgent</span></div></div>
    <div class="nav-links">
        <a href="{{ url_for('main.dashboard') }}" class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="{{ url_for('main.emails_page') }}" class="nav-link {% if request.endpoint == 'main.emails_page' %}active{% endif %}"><i class="fas fa-envelope"></i> All Emails</a>
        <a href="{{ url_for('main.analytics') }}" class="nav-link {% if request.endpoint == 'main.get_analytics' %}active{% endif %}"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a href="{{ url_for('main.categories') }}" class="nav-link {% if request.endpoint == 'main.get_categories' %}active{% endif %}"><i class="fas fa-tags"></i> Categories</a>
        <a href="{{ url_for('main.priority_inbox') }}" class="nav-link {% if request.endpoint == 'main.priority_inbox' %}active{% endif %}"><i class="fas fa-flag-checkered"></i> Priority Inbox</a>
    </div>
    <div class="sidebar-footer">
        <div class="agent-status"><div><span class="status-dot"></span> <span style="font-size:0.8rem;">Agent Active</span></div>
        <button id="runAgentBtn" class="run-agent-btn"><i class="fas fa-play"></i> Run Agent</button></div>
    </div>
</aside>

<main class="main-content">
    <!-- New top bar with search and icons -->
    <div class="top-bar">
        <div class="global-search">
            <input type="text" id="globalSearchInput" placeholder="Search any email...">
            <i class="fas fa-search"></i>
        </div>
        <div class="header-icons">
            <div class="header-icon" id="notifyIcon"><i class="fas fa-bell"></i></div>
            <div class="header-icon" id="settingsIcon"><i class="fas fa-cog"></i></div>
            <div class="header-icon" id="userIcon"><i class="fas fa-user"></i></div>
        </div>
    </div>
    {% block content %}{% endblock %}
</main>

<!-- Global Modal (reused for lists and email detail) -->
<div id="globalModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle" style="margin:0;">Title</h3>
            <button id="closeModalBtn" style="background:none; border:none; color:#94a3b8; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div id="modalBody" class="modal-body">Content</div>
        <div class="modal-footer" id="modalFooter" style="display: none;">
            <button id="downloadBtn" class="btn-secondary"><i class="fas fa-download"></i> Download (coming soon)</button>
            <button id="closeModalFooterBtn" class="btn-primary">Close</button>
        </div>
    </div>
</div>

<script>
    // Mobile menu
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    if(mobileBtn) mobileBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

    // Run agent
    document.getElementById('runAgentBtn')?.addEventListener('click', async () => {
        const btn = document.getElementById('runAgentBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
        btn.disabled = true;
        try {
            const res = await fetch('/api/run-agent', { method: 'POST' });
            const data = await res.json();
            alert(`Processed ${data.processed || 0} emails`);
            location.reload();
        } catch(e) { alert('Error running agent'); }
        finally { btn.innerHTML = orig; btn.disabled = false; }
    });

    // Global modal functions
    const modalOverlay = document.getElementById('globalModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalFooter = document.getElementById('modalFooter');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const closeModalFooterBtn = document.getElementById('closeModalFooterBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    function showModal(title, bodyHtml, showFooter = false) {
        modalTitle.innerText = title;
        modalBody.innerHTML = bodyHtml;
        modalFooter.style.display = showFooter ? 'flex' : 'none';
        modalOverlay.style.display = 'flex';
    }
    function closeModal() { modalOverlay.style.display = 'none'; }
    closeModalBtn.onclick = closeModal;
    if(closeModalFooterBtn) closeModalFooterBtn.onclick = closeModal;
    window.onclick = (e) => { if(e.target === modalOverlay) closeModal(); };
    downloadBtn.onclick = () => alert('Download feature coming soon!');

    // Global search
    const searchInput = document.getElementById('globalSearchInput');
    searchInput.addEventListener('keypress', async (e) => {
        if(e.key === 'Enter') {
            const query = searchInput.value.trim();
            if(!query) return;
            const res = await fetch(`/api/emails?search=${encodeURIComponent(query)}&per_page=50`);
            const data = await res.json();
            if(!data.emails.length) {
                showModal('Search Results', '<div class="text-center">No emails found</div>');
                return;
            }
            const resultsHtml = `<div style="display:flex; flex-direction:column; gap:0.5rem;">
                ${data.emails.map(email => `
                    <div class="email-list-item" data-id="${email.email_id}" style="background:#1e293b; border-radius:12px; padding:0.8rem; cursor:pointer;">
                        <div style="font-weight:600;">${escapeHtml(email.subject)}</div>
                        <div style="font-size:0.8rem; color:#94a3b8;">${escapeHtml(email.sender)} · ${new Date(email.processed_at).toLocaleString()}</div>
                    </div>
                `).join('')}
            </div>`;
            showModal(`Search: "${query}" (${data.total})`, resultsHtml);
            // attach click handlers after modal opens
            document.querySelectorAll('.email-list-item').forEach(el => {
                el.addEventListener('click', () => showEmailDetail(el.dataset.id));
            });
        }
    });

    // Function to fetch and display email detail modal
    window.showEmailDetail = async function(emailId) {
        try {
            const res = await fetch(`/api/email/${emailId}`);
            const email = await res.json();
            if(email.error) throw new Error('Not found');
            const detailHtml = `
                <div style="margin-bottom: 1rem;"><strong>From:</strong> ${escapeHtml(email.sender)}</div>
                <div style="margin-bottom: 1rem;"><strong>Subject:</strong> ${escapeHtml(email.subject)}</div>
                <div style="margin-bottom: 1rem;"><strong>Priority Score:</strong> ${email.priority_score || 50}</div>
                <div style="margin-bottom: 1rem;"><strong>Category:</strong> ${email.category || 'OTHER'}</div>
                <div style="margin-bottom: 1rem;"><strong>Received:</strong> ${new Date(email.processed_at).toLocaleString()}</div>
                <div><strong>Body:</strong></div>
                <div style="background:#0f172a; border-radius:16px; padding:1rem; margin-top:0.5rem; white-space:pre-wrap; font-family:monospace;">${escapeHtml(email.body_preview || 'No content')}</div>
            `;
            showModal(`📧 ${escapeHtml(email.subject.substring(0, 60))}`, detailHtml, true);
            // store current email id for download (future)
            downloadBtn.onclick = () => alert(`Download attachment for email ${emailId} - coming soon!`);
        } catch(e) { alert('Could not load email details'); }
    };

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Add fade-in to main content
    document.querySelector('.main-content')?.classList.add('animate-in');
</script>
</body>
</html>
