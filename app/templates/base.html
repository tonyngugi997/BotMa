<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Agent | Smart Email Management</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f5f7fa;
        }
        .sidebar-gradient {
            background: linear-gradient(135deg, #0f2b3d 0%, #1a4a6f 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            transition: all 0.3s ease;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.02);
        }
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="antialiased">
    <!-- Sidebar -->
    <aside class="fixed top-0 left-0 z-40 w-64 h-screen sidebar-gradient transition-transform">
        <div class="h-full px-3 py-6 overflow-y-auto">
            <div class="flex items-center gap-3 mb-8 px-2">
                <i class="fas fa-robot text-3xl text-white"></i>
                <span class="text-white font-semibold text-xl">Email Agent</span>
            </div>
            
            <ul class="space-y-2">
                <li>
                    <a href="{{ url_for('main.dashboard') }}" class="nav-link flex items-center gap-3 p-3 text-gray-300 rounded-lg hover:bg-white/10 hover:text-white transition group">
                        <i class="fas fa-chart-line w-5"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('main.emails') }}" class="nav-link flex items-center gap-3 p-3 text-gray-300 rounded-lg hover:bg-white/10 hover:text-white transition group">
                        <i class="fas fa-envelope w-5"></i>
                        <span>All Emails</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('main.analytics') }}" class="nav-link flex items-center gap-3 p-3 text-gray-300 rounded-lg hover:bg-white/10 hover:text-white transition group">
                        <i class="fas fa-chart-pie w-5"></i>
                        <span>Analytics</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('main.categories') }}" class="nav-link flex items-center gap-3 p-3 text-gray-300 rounded-lg hover:bg-white/10 hover:text-white transition group">
                        <i class="fas fa-tags w-5"></i>
                        <span>Categories</span>
                    </a>
                </li>
            </ul>
            
            <div class="absolute bottom-6 left-0 right-0 px-3">
                <div class="bg-white/10 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fas fa-circle text-green-400 text-xs"></i>
                        <span class="text-white text-sm">Agent Active</span>
                    </div>
                    <button id="runAgentBtn" class="w-full bg-white/20 hover:bg-white/30 text-white rounded-lg py-2 text-sm transition">
                        <i class="fas fa-play mr-2"></i>Run Agent Now
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="ml-64 p-8">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Active link highlighting
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('bg-white/20', 'text-white');
            }
        });
        
        // Run agent button
        document.getElementById('runAgentBtn')?.addEventListener('click', async () => {
            const btn = document.getElementById('runAgentBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Running...';
            btn.disabled = true;
            
            const response = await fetch('/api/run-agent', { method: 'POST' });
            const data = await response.json();
            
            btn.innerHTML = '<i class="fas fa-play mr-2"></i>Run Agent Now';
            btn.disabled = false;
            
            if (data.success) {
                alert(`Processed ${data.processed} emails`);
                location.reload();
            }
        });
    </script>
</body>
</html>
