{% extends "base.html" %}

{% block content %}
<div class="animate-in">
    <div style="margin-bottom: 1rem;">
        <a href="javascript:history.back()" style="color: #3b82f6; text-decoration: none;">← Back</a>
    </div>
    <div class="glass-card" style="padding: 2rem;">
        <div style="display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 1rem;">
            <div>
                <span style="background: #1e293b; padding: 4px 12px; border-radius: 40px;">ID: {{ email.email_id }}</span>
                <span style="background: {{ '#dc2626' if email.category=='SECURITY' else '#f59e0b' if email.category=='PROMOTION' else '#10b981' if email.category=='PERSONAL' else '#3b82f6' if email.category=='BUSINESS' else '#8b5cf6' if email.category=='SOCIAL' else '#64748b' }}; padding: 4px 12px; border-radius: 40px; margin-left: 8px;">
                    {{ email.category or 'OTHER' }}
                </span>
            </div>
            <div style="color: #94a3b8;">{{ email.processed_at }}</div>
        </div>
        <h1 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem;">{{ email.subject }}</h1>
        <div style="margin-bottom: 1rem;"><i class="fas fa-envelope"></i> From: {{ email.sender }}</div>
        <div style="margin-bottom: 1rem;"><i class="fas fa-chart-simple"></i> Priority Score: <strong>{{ email.priority_score or 50 }}</strong></div>
        <div style="background: #0f172a; border-radius: 16px; padding: 1rem; margin-top: 1rem; white-space: pre-wrap; font-family: monospace;">{{ email.body_preview or 'No content' }}</div>
    </div>
</div>
{% endblock %}
