{% extends "base.html" %}

{% block content %}
<div>
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Analytics</h1>
        <p class="text-gray-500 mt-1">Deep insights into your email patterns</p>
    </div>

    <!-- Time Range Selector -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
        <div class="flex gap-4">
            <button onclick="setRange('7d')" class="range-btn px-4 py-2 rounded-lg bg-blue-600 text-white">Last 7 Days</button>
            <button onclick="setRange('30d')" class="range-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700">Last 30 Days</button>
            <button onclick="setRange('90d')" class="range-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700">Last 90 Days</button>
            <button onclick="setRange('all')" class="range-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700">All Time</button>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Daily Email Volume</h3>
            <canvas id="dailyChart" height="300"></canvas>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Category Distribution</h3>
            <canvas id="categoryPieChart" height="300"></canvas>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Top Senders</h3>
            <canvas id="topSendersChart" height="300"></canvas>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Hourly Activity</h3>
            <canvas id="hourlyChart" height="300"></canvas>
        </div>
    </div>
</div>

<script>
    let currentRange = '30d';
    let dailyChart, categoryPieChart, topSendersChart, hourlyChart;

    async function loadAnalytics() {
        const response = await fetch(`/api/analytics?range=${currentRange}`);
        const data = await response.json();
        
        // Update daily chart
        if (dailyChart) dailyChart.destroy();
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        dailyChart = new Chart(dailyCtx, {
            type: 'line',
            data: {
                labels: data.daily.map(d => d.date),
                datasets: [{
                    label: 'Emails',
                    data: data.daily.map(d => d.count),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        // Update category pie chart
        if (categoryPieChart) categoryPieChart.destroy();
        const pieCtx = document.getElementById('categoryPieChart').getContext('2d');
        categoryPieChart = new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: Object.keys(data.categories),
                datasets: [{
                    data: Object.values(data.categories),
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#6b7280']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'right' } } }
        });
        
        // Update top senders chart
        if (topSendersChart) topSendersChart.destroy();
        const sendersCtx = document.getElementById('topSendersChart').getContext('2d');
        topSendersChart = new Chart(sendersCtx, {
            type: 'bar',
            data: {
                labels: data.top_senders.map(s => s.sender.substring(0, 20)),
                datasets: [{
                    label: 'Emails',
                    data: data.top_senders.map(s => s.count),
                    backgroundColor: '#10b981'
                }]
            },
            options: { responsive: true, indexAxis: 'y' }
        });
        
        // Update hourly chart
        if (hourlyChart) hourlyChart.destroy();
        const hourlyCtx = document.getElementById('hourlyChart').getContext('2d');
        hourlyChart = new Chart(hourlyCtx, {
            type: 'bar',
            data: {
                labels: data.hourly.map(h => `${h.hour}:00`),
                datasets: [{
                    label: 'Emails',
                    data: data.hourly.map(h => h.count),
                    backgroundColor: '#8b5cf6'
                }]
            },
            options: { responsive: true }
        });
    }

    function setRange(range) {
        currentRange = range;
        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-gray-200', 'text-gray-700');
        });
        event.target.classList.remove('bg-gray-200', 'text-gray-700');
        event.target.classList.add('bg-blue-600', 'text-white');
        loadAnalytics();
    }

    loadAnalytics();
</script>
{% endblock %}
