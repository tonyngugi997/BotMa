{% extends "base.html" %}

{% block content %}
<div class="animate-in">
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size: 2rem; font-weight: 700;">📊 Analytics</h1>
        <p style="color: #94a3b8;">Deep insights into your email patterns</p>
    </div>

    <!-- Time Range Buttons -->
    <div class="glass-card" style="padding: 1rem; margin-bottom: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button data-range="7d" class="range-btn active" style="background:#3b82f6; border:none; padding:6px 16px; border-radius:40px;">Last 7 Days</button>
        <button data-range="30d" class="range-btn" style="background:#1e293b; border:none; padding:6px 16px; border-radius:40px;">Last 30 Days</button>
        <button data-range="90d" class="range-btn" style="background:#1e293b; border:none; padding:6px 16px; border-radius:40px;">Last 90 Days</button>
        <button data-range="all" class="range-btn" style="background:#1e293b; border:none; padding:6px 16px; border-radius:40px;">All Time</button>
    </div>

    <!-- Stats Cards -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; margin-bottom: 2rem;" id="statsCards"></div>

    <!-- Charts Grid -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
        <div class="glass-card" style="padding: 1.5rem;">
            <h3><i class="fas fa-chart-line"></i> Daily Volume</h3>
            <canvas id="dailyChart" height="200"></canvas>
        </div>
        <div class="glass-card" style="padding: 1.5rem;">
            <h3><i class="fas fa-chart-pie"></i> Category Distribution</h3>
            <canvas id="categoryChart" height="200"></canvas>
        </div>
        <div class="glass-card" style="padding: 1.5rem;">
            <h3><i class="fas fa-users"></i> Top Senders</h3>
            <canvas id="sendersChart" height="200"></canvas>
        </div>
        <div class="glass-card" style="padding: 1.5rem;">
            <h3><i class="fas fa-clock"></i> Hourly Activity</h3>
            <canvas id="hourlyChart" height="200"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    let currentRange = '7d';
    let dailyChart, categoryChart, sendersChart, hourlyChart;

    async function loadAnalytics() {
        const res = await fetch(`/api/analytics?range=${currentRange}`);
        const data = await res.json();
        document.getElementById('statsCards').innerHTML = `
            <div class="glass-card" style="padding:1rem; text-align:center;"><div style="font-size:2rem; font-weight:700;">${data.total_emails}</div><div>Total Emails</div></div>
            <div class="glass-card" style="padding:1rem; text-align:center;"><div style="font-size:2rem; font-weight:700;">${data.unique_senders}</div><div>Unique Senders</div></div>
            <div class="glass-card" style="padding:1rem; text-align:center;"><div style="font-size:2rem; font-weight:700;">${Object.keys(data.categories).length}</div><div>Categories</div></div>
            <div class="glass-card" style="padding:1rem; text-align:center;"><div style="font-size:2rem; font-weight:700;">${data.daily_avg || 0}</div><div>Daily Avg</div></div>
        `;
        if (dailyChart) dailyChart.destroy();
        dailyChart = new Chart(document.getElementById('dailyChart'), {
            type: 'line',
            data: { labels: data.daily.map(d=>d.date), datasets: [{ label: 'Emails', data: data.daily.map(d=>d.count), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, plugins: { legend: { labels: { color: '#cbd5e1' } } } }
        });
        if (categoryChart) categoryChart.destroy();
        categoryChart = new Chart(document.getElementById('categoryChart'), {
            type: 'pie', data: { labels: Object.keys(data.categories), datasets: [{ data: Object.values(data.categories), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#64748b'] }] },
            options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#cbd5e1' } } } }
        });
        if (sendersChart) sendersChart.destroy();
        sendersChart = new Chart(document.getElementById('sendersChart'), {
            type: 'bar', data: { labels: data.top_senders.map(s=>s.sender.length>20?s.sender.substring(0,20)+'...':s.sender), datasets: [{ label: 'Emails', data: data.top_senders.map(s=>s.count), backgroundColor: '#8b5cf6' }] },
            options: { responsive: true, indexAxis: 'y', plugins: { legend: { labels: { color: '#cbd5e1' } } } }
        });
        if (hourlyChart) hourlyChart.destroy();
        hourlyChart = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar', data: { labels: data.hourly.map(h=>`${h.hour}:00`), datasets: [{ label: 'Emails', data: data.hourly.map(h=>h.count), backgroundColor: '#10b981' }] },
            options: { responsive: true, plugins: { legend: { labels: { color: '#cbd5e1' } } } }
        });
    }
    document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentRange = btn.dataset.range;
            document.querySelectorAll('.range-btn').forEach(b=>{b.style.background='#1e293b';});
            btn.style.background='#3b82f6';
            loadAnalytics();
        });
    });
    loadAnalytics();
</script>
{% endblock %}
