{% extends "base.html" %}

{% block content %}
<div class="animate-in">
    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 1rem;">🏷️ Categories</h1>
    <p style="color: #94a3b8; margin-bottom: 2rem;">Manage and explore emails by category</p>

    <div id="categoryCards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem;"></div>

    <div id="categoryEmailsSection" style="display: none;">
        <div class="glass-card" style="padding: 1.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <h3 id="selectedCategoryTitle" style="font-weight: 600;"></h3>
                <button id="clearCategoryBtn" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖ Clear</button>
            </div>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr style="border-bottom:1px solid #334155;"><th style="padding: 8px; text-align:left;">Sender</th><th>Subject</th><th>Date</th></tr></thead>
                    <tbody id="categoryEmailsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const categoryConfig = {
        'SECURITY': { icon: '🔒', color: '#dc2626' },
        'PROMOTION': { icon: '🎯', color: '#f59e0b' },
        'PERSONAL': { icon: '👤', color: '#10b981' },
        'BUSINESS': { icon: '💼', color: '#3b82f6' },
        'SOCIAL': { icon: '📱', color: '#8b5cf6' },
        'OTHER': { icon: '📁', color: '#64748b' }
    };
    async function loadCategories() {
        const res = await fetch('/api/categories');
        const data = await res.json();
        const container = document.getElementById('categoryCards');
        if (Object.keys(data).length === 0) { container.innerHTML = '<div>No categories found.</div>'; return; }
        container.innerHTML = Object.entries(data).map(([cat, count]) => `
            <div class="glass-card" style="padding: 1rem; text-align: center; cursor: pointer;" onclick="selectCategory('${cat}')" data-category="${cat}">
                <div style="font-size: 2rem;">${categoryConfig[cat]?.icon || '📁'}</div>
                <div style="font-weight: 600; margin-top: 0.5rem;">${cat}</div>
                <div style="font-size: 1.5rem; font-weight: 700;">${count}</div>
            </div>
        `).join('');
    }
    async function selectCategory(category) {
        document.getElementById('categoryEmailsSection').style.display = 'block';
        document.getElementById('selectedCategoryTitle').innerHTML = `${categoryConfig[category]?.icon || '📁'} ${category} Emails`;
        const res = await fetch(`/api/emails?category=${category}&per_page=50`);
        const data = await res.json();
        const tbody = document.getElementById('categoryEmailsBody');
        if (!data.emails.length) { tbody.innerHTML = '<tr><td colspan="3">No emails</td></tr>'; return; }
        tbody.innerHTML = data.emails.map(email => `
            <tr style="border-bottom:1px solid #1e293b; cursor:pointer;" onclick="window.location.href='/email/${email.email_id}'">
                <td style="padding:8px;">${escapeHtml(email.sender.substring(0,40))}</td>
                <td style="padding:8px;">${escapeHtml(email.subject.substring(0,60))}</td>
                <td style="padding:8px;">${new Date(email.processed_at).toLocaleDateString()}</td>
            </tr>
        `).join('');
    }
    document.getElementById('clearCategoryBtn')?.addEventListener('click', () => {
        document.getElementById('categoryEmailsSection').style.display = 'none';
    });
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    loadCategories();
</script>
{% endblock %}
