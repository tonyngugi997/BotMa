{% extends "base.html" %}

{% block content %}
<div class="animate-in">
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; color: transparent;">📬 All Emails</h1>
        <p style="color: #94a3b8;">Search, filter, and manage your processed emails</p>
    </div>

    <!-- Filter Bar -->
    <div class="glass-card" style="padding: 1.5rem; margin-bottom: 2rem;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
            <div>
                <input type="text" id="searchInput" placeholder="Search sender or subject..." style="width: 100%; padding: 10px 12px; border-radius: 40px; border: 1px solid #334155; background: #1e293b; color: white;">
            </div>
            <div>
                <select id="categoryFilter" style="width: 100%; padding: 10px 12px; border-radius: 40px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="">All Categories</option>
                    <option value="SECURITY">🔒 Security</option>
                    <option value="PROMOTION">🎯 Promotion</option>
                    <option value="PERSONAL">👤 Personal</option>
                    <option value="BUSINESS">💼 Business</option>
                    <option value="SOCIAL">📱 Social</option>
                    <option value="OTHER">📁 Other</option>
                </select>
            </div>
            <div>
                <select id="priorityFilter" style="width: 100%; padding: 10px 12px; border-radius: 40px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="">All Priorities</option>
                    <option value="high">🔴 High (≥70)</option>
                    <option value="medium">🟡 Medium (40-69)</option>
                    <option value="low">🟢 Low (&lt;40)</option>
                </select>
            </div>
            <div>
                <select id="sortSelect" style="width: 100%; padding: 10px 12px; border-radius: 40px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="desc">Newest First</option>
                    <option value="asc">Oldest First</option>
                </select>
            </div>
            <div>
                <button id="searchBtn" class="btn-primary" style="width: 100%;">🔍 Search</button>
            </div>
        </div>
    </div>

    <!-- View Toggle & Stats -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <div style="color: #94a3b8;" id="resultStats"></div>
        <div style="display: flex; gap: 8px;">
            <button id="tableViewBtn" style="background: #3b82f6; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer;"><i class="fas fa-table"></i> Table</button>
            <button id="cardViewBtn" style="background: #1e293b; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer;"><i class="fas fa-th-large"></i> Cards</button>
        </div>
    </div>

    <!-- Table View -->
    <div id="tableView" class="glass-card" style="overflow-x: auto; padding: 0;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead style="border-bottom: 1px solid #334155;">
                <tr style="color: #94a3b8;">
                    <th style="padding: 1rem; text-align: left;">Sender</th>
                    <th style="padding: 1rem; text-align: left;">Subject</th>
                    <th style="padding: 1rem; text-align: left;">Priority</th>
                    <th style="padding: 1rem; text-align: left;">Category</th>
                    <th style="padding: 1rem; text-align: left;">Date</th>
                    <th style="padding: 1rem; text-align: left;"></th>
                 </tr>
            </thead>
            <tbody id="emailsTableBody">
                <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading...</td></tr>
            </tbody>
        </table>
        <div id="pagination" style="padding: 1rem; border-top: 1px solid #334155; display: flex; justify-content: space-between;"></div>
    </div>

    <!-- Card View (hidden initially) -->
    <div id="cardView" style="display: none; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;"></div>
</div>

<script>
    let currentPage = 1;
    let currentCategory = '';
    let currentSearch = '';
    let currentSort = 'desc';
    let currentPriority = '';
    let viewMode = 'table';

    async function loadEmails() {
        const params = new URLSearchParams({
            page: currentPage,
            per_page: 20,
            category: currentCategory,
            search: currentSearch,
            sort: currentSort,
            priority: currentPriority
        });
        const res = await fetch(`/api/emails?${params}`);
        const data = await res.json();
        document.getElementById('resultStats').innerHTML = `Showing ${data.emails.length} of ${data.total} emails`;
        if (viewMode === 'table') renderTable(data);
        else renderCards(data);
        renderPagination(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('emailsTableBody');
        if (!data.emails.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No emails found</td></tr>';
            return;
        }
        tbody.innerHTML = data.emails.map(email => `
            <tr style="border-bottom: 1px solid #1e293b; cursor: pointer;" onclick="showEmailDetail('${email.email_id}')">
                <td style="padding: 1rem;">${escapeHtml(email.sender.substring(0, 50))}</td>
                <td style="padding: 1rem; font-weight: 500;">${escapeHtml(email.subject.substring(0, 60))}</td>
                <td style="padding: 1rem;"><span style="background: ${getPriorityColor(email.priority_score)}; padding: 4px 10px; border-radius: 30px; font-size: 0.75rem;">${email.priority_score || 50}</span></td>
                <td style="padding: 1rem;">${getCategoryBadge(email.category)}</td>
                <td style="padding: 1rem;">${new Date(email.processed_at).toLocaleDateString()}</td>
                <td style="padding: 1rem;"><i class="fas fa-chevron-right"></i></td>
            </tr>
        `).join('');
    }

    function renderCards(data) {
        const container = document.getElementById('cardView');
        if (!data.emails.length) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;">No emails found</div>';
            return;
        }
        container.innerHTML = data.emails.map(email => `
            <div class="glass-card" style="padding: 1.2rem; cursor: pointer;" onclick="showEmailDetail('${email.email_id}')">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>${getCategoryBadge(email.category)}</span>
                    <span style="background: ${getPriorityColor(email.priority_score)}; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem;">${email.priority_score}</span>
                </div>
                <h3 style="font-weight: 600; margin: 0.5rem 0;">${escapeHtml(email.subject.substring(0, 50))}</h3>
                <p style="color: #94a3b8; font-size: 0.8rem;">${escapeHtml(email.sender)}</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">${escapeHtml((email.body_preview || '').substring(0, 80))}...</p>
                <div style="margin-top: 0.8rem; font-size: 0.7rem; color: #3b82f6;">${new Date(email.processed_at).toLocaleDateString()}</div>
            </div>
        `).join('');
        container.style.display = 'grid';
    }

    function getCategoryBadge(cat) {
        const colors = { SECURITY:'#dc2626', PROMOTION:'#f59e0b', PERSONAL:'#10b981', BUSINESS:'#3b82f6', SOCIAL:'#8b5cf6', OTHER:'#64748b' };
        const icons = { SECURITY:'🔒', PROMOTION:'🎯', PERSONAL:'👤', BUSINESS:'💼', SOCIAL:'📱', OTHER:'📁' };
        return `<span style="background: ${colors[cat] || '#64748b'}; padding: 2px 10px; border-radius: 30px; font-size: 0.7rem;">${icons[cat] || '📁'} ${cat || 'OTHER'}</span>`;
    }

    function getPriorityColor(score) {
        if (score >= 70) return '#dc2626';
        if (score >= 40) return '#f59e0b';
        return '#22c55e';
    }

    function renderPagination(data) {
        const div = document.getElementById('pagination');
        if (data.total_pages <= 1) { div.innerHTML = ''; return; }
        let html = `<span>Page ${data.page} of ${data.total_pages}</span><div>`;
        if (data.page > 1) html += `<button onclick="goToPage(${data.page-1})" style="background:#1e293b; border:none; padding:4px 12px; border-radius:20px; margin-right:8px;">← Prev</button>`;
        if (data.page < data.total_pages) html += `<button onclick="goToPage(${data.page+1})" style="background:#1e293b; border:none; padding:4px 12px; border-radius:20px;">Next →</button>`;
        html += `</div>`;
        div.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadEmails(); }

    document.getElementById('searchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('searchInput').value;
        currentCategory = document.getElementById('categoryFilter').value;
        currentPriority = document.getElementById('priorityFilter').value;
        currentSort = document.getElementById('sortSelect').value;
        currentPage = 1;
        loadEmails();
    });
    
    document.getElementById('tableViewBtn').addEventListener('click', () => {
        viewMode = 'table';
        document.getElementById('tableView').style.display = 'block';
        document.getElementById('cardView').style.display = 'none';
        loadEmails();
    });
    
    document.getElementById('cardViewBtn').addEventListener('click', () => {
        viewMode = 'card';
        document.getElementById('tableView').style.display = 'none';
        document.getElementById('cardView').style.display = 'grid';
        loadEmails();
    });
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }
    
    loadEmails();
</script>
{% endblock %}
